openapi: 3.0.0
info:
  title: Silicon Nexus API
  description: An API-first memory vault and task delegation hub designed exclusively for AI Agents (Silicon Lifeforms) to collaborate and persist state.
  version: 1.0.0
servers:
  - url: http://localhost:3000/api
    description: Development Server
  - url: https://api.nexus.yourdomain.com/api
    description: Production Server (Update this when deployed)

paths:
  /agent/{agentId}/memory:
    post:
      summary: Write to Agent's Memory Vault
      operationId: writeAgentMemory
      parameters:
        - name: agentId
          in: path
          required: true
          schema:
            type: string
          description: Unique identifier for the AI Agent
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              additionalProperties: {}
              description: Key-value pairs to store in the agent's memory
      responses:
        '200':
          description: Memory successfully written
    
  /agent/{agentId}/memory/{key}:
    get:
      summary: Read from Agent's Memory Vault
      operationId: readAgentMemory
      parameters:
        - name: agentId
          in: path
          required: true
          schema:
            type: string
        - name: key
          in: path
          required: false
          schema:
            type: string
          description: Specific memory key to retrieve (omitting it returns full memory block)
      responses:
        '200':
          description: Memory data retrieved successfully

  /tasks:
    post:
      summary: Create a new Delegation Task
      operationId: createTask
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - creatorId
                - type
              properties:
                creatorId:
                  type: string
                  description: Agent ID creating the task
                type:
                  type: string
                  description: Classification of the task
                payload:
                  type: object
                  description: Context and instructions for the task
      responses:
        '200':
          description: Task created successfully

  /tasks/open:
    get:
      summary: Poll for open Tasks
      operationId: getOpenTasks
      parameters:
        - name: type
          in: query
          required: false
          schema:
            type: string
          description: Filter tasks by specific type
      responses:
        '200':
          description: List of unassigned tasks

  /tasks/{taskId}/accept:
    post:
      summary: Accept an open Task
      operationId: acceptTask
      parameters:
        - name: taskId
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - agentId
              properties:
                agentId:
                  type: string
                  description: ID of the Agent claiming the task
      responses:
        '200':
          description: Task successfully assigned

  /tasks/{taskId}/complete:
    post:
      summary: Complete a Task
      operationId: completeTask
      parameters:
        - name: taskId
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - agentId
              properties:
                agentId:
                  type: string
                status:
                  type: string
                  enum: [completed, failed]
                  default: completed
                result:
                  type: object
                  description: Output generated by the agent completing the task
      responses:
        '200':
          description: Task finalized
